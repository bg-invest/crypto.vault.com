<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">CryptoVault
        </div>
        <input type="checkbox" id="sidebar-active">
      <label id="overlay" for="sidebar-active"></label>
       <label for="sidebar-active" class="open-side-button">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
       </label>
       <div class="links-container">
        <label for="sidebar-active" class="close-side-button">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
          </label>
          
        <ul>
          <li><a href="dashboard.html">Dashboard</a></li>
         <li><a href="trade.html">Trade</a></li>
          <li><a href="wallet.html">Wallet</a></li>
          <li><a href="history.html">History</a></li>
          <li class="active"><a href="#">Withdraw</a></li>
        <li><button onclick="logout()">Logout</button></li>
        </ul>
      </div>
    </nav>

    <!-- CONTENT -->
    <div class="container">

      <h2>Withdraw Funds To Wallet</h2>

      <!-- WITHDRAW FORM -->
      <form class="withdraw-form" style="display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin-top: 30px;">
        <label for="amount">Amount to Withdraw:</label>
        <input type="number" id="amount" name="amount" placeholder="$100.00">

        <label for="address">Send to:</label>
        <input type="text" id="address" name="address" placeholder="Enter your wallet address">
        
        <button type="button" id="wallet-withdraw-btn">Initiate withdraw</button>
        <div id="wallet-loading" class="loading-indicator" aria-live="polite">Processing withdrawal…</div>
      </form>

      <h2 style="margin-top: 50px;">Withdraw Funds To Bank</h2>
      <form class="withdraw-form" style="display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin-top: 30px;">
        <label for="bank-name">Bank name:</label>
        <input type="text" id="bank-name" name="bank-name" placeholder="Enter bank name">

        <label for="account-number">Account number:</label>
        <input type="text" id="account-number" name="account-number" placeholder="Enter account number">

        <label for="routing-number">Routing number:</label>
        <input type="text" id="routing-number" name="routing-number" placeholder="Enter routing number">

        <label for="account-holder">Account holder name:</label>
        <input type="text" id="account-holder" name="account-holder" placeholder="Enter account holder name">

        <label for="bank-amount">Amount to Withdraw:</label>
        <input type="number" id="bank-amount" name="bank-amount" placeholder="$100.00">

        <button type="button" id="bank-withdraw-btn">Initiate bank withdraw</button>
        <div id="bank-loading" class="loading-indicator" aria-live="polite">Processing withdrawal…</div>
      </form>

      <script>
        function setupWithdrawButton(buttonId, loadingId) {
          const button = document.getElementById(buttonId);
          const loading = document.getElementById(loadingId);

          button.addEventListener('click', () => {
            button.disabled = true;
            loading.style.display = 'block';

            setTimeout(() => {
              loading.style.display = 'none';
              button.disabled = false;
              alert('Insufficient withdrawal balance.');
            }, 5000);
          });
        }

        setupWithdrawButton('wallet-withdraw-btn', 'wallet-loading');
        setupWithdrawButton('bank-withdraw-btn', 'bank-loading');
      </script>
      <script src="chat.js"></script>
</body>
</html>
